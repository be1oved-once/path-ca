/* =========================================================
   LEADERBOARD ADVANCED DESIGN SYSTEM
========================================================= */
:root {

/* =====================================================

===================================================== */

/* =====================================================

===================================================== */

  margin-bottom: 28px;

}

.lb-heading {

  font-size: 14px;

  padding: 14px 32px;

    0 10px 40px -10px rgba(102, 126, 234, 0.5),
    0 4px 12px rgba(0, 0, 0, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.18);
  backdrop-filter: blur(10px);

}

@keyframes lb-pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 10px 40px -10px rgba(102, 126, 234, 0.5); }
  50% { transform: scale(1.02); box-shadow: 0 15px 50px -10px rgba(102, 126, 234, 0.7); }
}

.lb-reset-text {

<script type="module">
import { db } from "./assets/js/firebase.js";
import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
import { getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const list = document.getElementById("leaderboardList");
const skeleton = document.getElementById("leaderboardSkeleton");

function getNextWeeklyReset() {
  const now = new Date();

  // Convert to IST
  const istNow = new Date(
    now.toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
  );

  const day = istNow.getDay(); 
  // Sunday = 0

  const next = new Date(istNow);

  // Move to coming Sunday
  const daysToSunday = (7 - day) % 7;
  next.setDate(istNow.getDate() + daysToSunday);

  // Set time to 23:59:59
  next.setHours(23, 59, 59, 0);

  // If already past this week's reset → next Sunday
  if (next <= istNow) {
    next.setDate(next.getDate() + 7);
  }

  return next;
}

function startResetTimer() {
  const el = document.getElementById("lbResetTimer");
  if (!el) return;

  function update() {
    const now = new Date(
      new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
    );

    const nextReset = getNextWeeklyReset();
    const diff = nextReset - now;

    if (diff <= 0) {
      el.textContent = "Resetting...";
      return;
    }

    const totalMin = Math.floor(diff / 60000);
    const days = Math.floor(totalMin / 1440);
    const hours = Math.floor((totalMin % 1440) / 60);
    const minutes = totalMin % 60;

    el.textContent =
      `Resets in: ${days}d ${hours}h ${minutes}m`;
  }

  update();
  setInterval(update, 60000); // update every minute
}
function listenLeaderboard() {

  // Show skeleton first
  skeleton.style.display = "block";
  list.style.display = "none";

  const ref = collection(db, "publicLeaderboard");

  // 🔥 Realtime Firestore listener
  onSnapshot(ref, (snap) => {
    const users = [];

    snap.forEach(docSnap => {
      const data = docSnap.data();
const xp = data.xp || 0;

// ❌ Skip users with 0 XP
if (xp <= 0) return;

const currentWeek = getWeekKey();

// ❌ Ignore old week data
if (data.weekKey !== currentWeek) return;

users.push({
  name: data.name || "User",
  gender: data.gender || "",
  dob: data.dob || "",
  xp: xp,
  pfp: data.pfp || ""
});
    });

    // Sort by XP high → low
    users.sort((a, b) => b.xp - a.xp);

    // Hide skeleton after first data arrives
    skeleton.style.display = "none";
    list.style.display = "flex";

    renderLeaderboard(users);
  });
}

function renderLeaderboard(users) {
  list.innerHTML = "";

  users.forEach((u, i) => {
    const row = document.createElement("div");

    let cls = "";
    let icon = "";

    if (i === 0) {
      cls = "lb-gold";
      icon = `<i class="fa-solid fa-crown"></i>`;
    }
    else if (i === 1) {
      cls = "lb-silver";
      icon = `<i class="fa-solid fa-medal"></i>`;
    }
    else if (i === 2) {
      cls = "lb-bronze";
      icon = `<i class="fa-solid fa-award"></i>`;
    }
    else {
      icon = `<span class="lb-serial">${i + 1}</span>`;
    }

    row.className = `lb-row ${cls}`;
    row.innerHTML = `
      <div class="lb-top">
        <div class="lb-left">
          <div class="lb-rank">${icon}</div>
          <div class="lb-name">${u.name}</div>
        </div>
        <div class="lb-xp">${u.xp} XP</div>
      </div>

      <div class="lb-expand">
        <div class="lb-profile-card">

  ${u.pfp ? `
    <div class="lb-profile-pfp-wrap">
      <img src="${u.pfp}" class="lb-profile-pfp">
    </div>
  ` : ""}
          <div class="lb-profile-row">
            <span class="lb-profile-label">Name</span>
            <span class="lb-profile-value">${u.name}</span>
          </div>

          <div class="lb-profile-row">
            <span class="lb-profile-label">Gender</span>
            <span class="lb-profile-value">${u.gender || "—"}</span>
          </div>

          <div class="lb-profile-row">
            <span class="lb-profile-label">DOB</span>
            <span class="lb-profile-value">${u.dob || "—"}</span>
          </div>
        </div>
      </div>
    `;

    list.appendChild(row);
  });

  enableExpand();
}

function enableExpand() {
  const rows = document.querySelectorAll(".lb-row");

  rows.forEach(row => {
    row.addEventListener("click", e => {
      e.stopPropagation();
      rows.forEach(r => {
        if (r !== row) r.classList.remove("expanded");
      });
      row.classList.toggle("expanded");
    });
  });

  document.addEventListener("click", () => {
    rows.forEach(r => r.classList.remove("expanded"));
  });
}
// 🚀 Start reset timer
startResetTimer();
// 🔄 auto refresh when week changes
let lastWeekKey = getWeekKey();

setInterval(() => {
  const nowWeek = getWeekKey();
  if (nowWeek !== lastWeekKey) {
    lastWeekKey = nowWeek;
    listenLeaderboard(); // reload fresh week
  }
}, 60000);
// 🚀 Start realtime listener
listenLeaderboard();
function getWeekKey() {
  const now = new Date(
    new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
  );
  
  const year = now.getFullYear();
  
  // week number calculation
  const firstJan = new Date(year, 0, 1);
  const days = Math.floor((now - firstJan) / 86400000);
  const week = Math.ceil((days + firstJan.getDay() + 1) / 7);
  
  return `${year}-W${week}`;
}
</script>
